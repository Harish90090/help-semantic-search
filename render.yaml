services:
  - type: web
    name: help-drb-search
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app/app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    envVars:
      - key: GEMINI_API_KEY
        sync: false   # set manually in Render dashboard
    autoDeploy: true
